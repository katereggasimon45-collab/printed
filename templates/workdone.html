{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
{% endblock %}

{% block content %}

<!-- ===== TOP BANNER IMAGE WITH GRADIENT & TEXT ===== -->
<section class="work-banner">
    <img src="{{ url_for('static', filename='images/bad.png') }}" alt="Our Work Banner">
    <div class="banner-overlay">
        
        
    </div>
</section>

<!-- ===== TITLE ===== -->
<section class="work-header">
    <h1>Our Work</h1>
    <p>High-quality printing projects delivered with precision and creativity</p>
</section>

<!-- ===== WORK GRID ===== -->
<section class="work-section">
    <div class="work-grid masonry">

        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/f1.png') }}" alt="Project 1">
        </div>

        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/f3.png') }}" alt="Project 2">
        </div>
        
        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/12.png') }}" alt="Project 2">
        </div>
        
        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/09.png') }}" alt="Project 2">
        </div>

        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/f4.png') }}" alt="Project 3">
        </div>

        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/f6.png') }}" alt="Project 4">
        </div>

        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/b.png') }}" alt="Project 5">
        </div>

        <div class="work-card animate-on-scroll">
            <img data-src="{{ url_for('static', filename='images/r.png') }}" alt="Project 6">
        </div>

    </div>
</section>

<!-- ===== LAZY LOAD + SCROLL ANIMATION SCRIPT ===== -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const images = document.querySelectorAll(".work-card img");
    const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                const img = entry.target;
                const src = img.dataset.src;
                if(src){
                    img.src = src;
                    img.onload = () => img.classList.add("loaded");
                }
                obs.unobserve(img);
            }
        });
    }, { rootMargin: "0px 0px 200px 0px" });

    images.forEach(img => observer.observe(img));

    // Scroll animation
    const cards = document.querySelectorAll(".work-card.animate-on-scroll");
    const scrollObserver = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add("visible");
                obs.unobserve(entry.target);
            }
        });
    }, { threshold: 0.2 });

    cards.forEach(card => scrollObserver.observe(card));
});
</script>

{% endblock %}
