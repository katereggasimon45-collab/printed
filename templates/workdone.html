{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
{% endblock %}

{% block content %}

<!-- ===== TOP BANNER ===== -->
<section class="work-banner">
    <img src="{{ url_for('static', filename='images/bad.png') }}" alt="Our Printing Work">
    <div class="banner-overlay">
        <h1>Our Work</h1>
        <p>Creative, high-quality printing projects that make brands stand out</p>
    </div>
</section>

<!-- ===== TITLE ===== -->
<section class="work-header">
    <h2>Portfolio</h2>
    <p>Explore some of our recent printing designs and completed jobs</p>
</section>

<!-- ===== WORK GRID ===== -->
<section class="work-section">
    <div class="work-grid">

        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/f1.png') }}" loading="lazy" alt="Banner Design">
        </div>

        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/f3.png') }}" loading="lazy" alt="Business Card Design">
        </div>
        
        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/12.png') }}" loading="lazy" alt="Flyer Print">
        </div>
        
        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/09.png') }}" loading="lazy" alt="Poster Design">
        </div>

        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/f4.png') }}" loading="lazy" alt="Branding Work">
        </div>

        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/f6.png') }}" loading="lazy" alt="Large Format Print">
        </div>

        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/b.png') }}" loading="lazy" alt="Sticker Printing">
        </div>

        <div class="work-card animate-on-scroll">
            <img src="{{ url_for('static', filename='images/r.png') }}" loading="lazy" alt="Custom Design Work">
        </div>
<script>
document.addEventListener("DOMContentLoaded", () => {

    // Add "loaded" class when each image finishes loading
    document.querySelectorAll(".work-card img").forEach(img => {
        if (img.complete) {
            img.classList.add("loaded");
        } else {
            img.addEventListener("load", () => {
                img.classList.add("loaded");
            });
        }
    });

    // Scroll animation
    const cards = document.querySelectorAll(".work-card");

    const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add("visible");
                obs.unobserve(entry.target);
            }
        });
    }, { threshold: 0.2 });

    cards.forEach(card => observer.observe(card));
});
</script>
    </div>
</section>

<!-- ===== SCRIPT ===== -->

{% endblock %}
